<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lexicon — Vocabulary Game</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Work+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Libre+Caslon+Display&family=Archivo:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
  ::selection { background: rgba(138,58,46,.18); }
  button { font: inherit; }
  ::selection { background: rgba(138,58,46,.18); }
  /* audio pronunciation button */
  .spk-btn:hover { transform: translateY(-1px); }
  .spk-btn:active { transform: scale(.92); }
  .spk-w1, .spk-w2 { transform-origin: center; opacity: .9; }
  .spk-playing .spk-w1 { animation: spkpulse .7s ease-in-out infinite; }
  .spk-playing .spk-w2 { animation: spkpulse .7s ease-in-out infinite .15s; }
  @keyframes spkpulse { 0%, 100% { opacity: .25; } 50% { opacity: 1; } }
  /* keep the tweaks panel readable regardless of active theme */
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

</head>

</body>
</html>
